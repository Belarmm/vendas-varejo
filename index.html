<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1b2d">
<title>Comparativo de Preços — Eurovidros</title>
<style>
:root {
  --bg: #0f1b2d;
  --bg2: #162235;
  --bg3: #1e2f45;
  --border: #2a3f5a;
  --text: #e8f0fe;
  --text2: #8faac8;
  --accent: #1a8fe3;
  --accent2: #0bd48c;
  --gold: #f5a623;
  --red: #e84040;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; min-height: 100vh; }

/* HEADER */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
}
.logo-icon { font-size: 24px; }
.header-title { flex: 1; }
.header-title h1 { font-size: 16px; font-weight: 700; color: var(--accent); }
.header-title p { font-size: 11px; color: var(--text2); margin-top: 1px; }
.badge-mes {
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 3px 8px; border-radius: 20px;
  letter-spacing: 0.5px; white-space: nowrap;
}

/* MAIN */
main { padding: 16px; max-width: 500px; margin: 0 auto; padding-bottom: 40px; }

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 16px;
}
.card-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  color: var(--text2); text-transform: uppercase; margin-bottom: 10px;
}

/* PRODUTO PICKER BUTTON */
.picker-btn {
  width: 100%;
  background: var(--bg3);
  color: var(--text2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 14px 44px 14px 14px;
  font-size: 15px;
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  position: relative;
  transition: border-color 0.2s;
  display: flex; align-items: center; justify-content: space-between;
  min-height: 50px;
}
.picker-btn.active { color: var(--text); border-color: var(--accent); }
.picker-btn .arrow { color: var(--accent); font-size: 18px; flex-shrink: 0; margin-left: 8px; }
.picker-btn .nome { flex: 1; font-size: 14px; line-height: 1.3; }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.7);
}
.modal-overlay.open { display: flex; flex-direction: column; justify-content: flex-end; }
.modal-sheet {
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  max-height: 80vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 12px auto 0;
  flex-shrink: 0;
}
.modal-title {
  font-size: 14px; font-weight: 700;
  color: var(--text2); text-transform: uppercase; letter-spacing: 1px;
  padding: 12px 16px 8px;
  flex-shrink: 0;
}
.modal-search {
  margin: 0 16px 10px;
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 15px; font-family: inherit;
  color: var(--text);
  outline: none;
  flex-shrink: 0;
}
.modal-search:focus { border-color: var(--accent); }
.modal-list {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  flex: 1;
  padding: 0 8px 20px;
}
.modal-item {
  padding: 14px 12px;
  font-size: 14px;
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
  border-bottom: 1px solid rgba(42,63,90,0.5);
  transition: background 0.1s;
  line-height: 1.4;
}
.modal-item:last-child { border-bottom: none; }
.modal-item:active { background: var(--bg3); }
.modal-item.selected { color: var(--accent); font-weight: 700; }

/* CHIPS */
.chips-grid {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px;
}
.chip {
  background: var(--bg3);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 14px; font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  user-select: none;
  min-width: 56px; text-align: center;
  transition: all 0.15s;
}
.chip:active { transform: scale(0.95); }
.chip.selected {
  background: var(--accent); border-color: var(--accent);
  color: #fff;
  box-shadow: 0 2px 10px rgba(26,143,227,0.4);
}

/* BTN */
.btn-consultar {
  width: 100%;
  background: var(--accent); color: #fff;
  border: none; border-radius: 12px;
  padding: 16px; font-size: 16px; font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  margin-top: 4px;
}
.btn-consultar:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-consultar:not(:disabled):active { transform: scale(0.98); opacity: 0.85; }

/* RESULTADOS */
#resultado { margin-top: 4px; }
.resultado-header {
  font-size: 13px; color: var(--text2);
  margin-bottom: 12px; padding: 0 2px;
}
.resultado-header strong { color: var(--accent); }

.fornecedor-card {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px;
  position: relative;
}
.fornecedor-card.melhor {
  border-color: var(--accent2);
  box-shadow: 0 0 0 1px var(--accent2), 0 4px 20px rgba(11,212,140,0.1);
}
.badge-melhor {
  position: absolute; top: -1px; right: 12px;
  background: var(--accent2); color: #0a1a12;
  font-size: 10px; font-weight: 800;
  padding: 3px 10px; border-radius: 0 0 8px 8px;
  letter-spacing: 0.5px; text-transform: uppercase;
}
.fornec-nome { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 12px; padding-right: 80px; }
.fornec-grade { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fornec-item { background: var(--bg3); border-radius: 8px; padding: 10px 12px; }
.fornec-item.full { grid-column: 1 / -1; }
.fornec-item-label { font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
.fornec-item-val { font-size: 17px; font-weight: 700; color: var(--text); }
.fornec-item-val.destaque { color: var(--accent2); font-size: 19px; }
.fornec-item-val.destaque-gold { color: var(--gold); }
.ipi-tag { display: inline-block; background: rgba(245,166,35,0.15); color: var(--gold); font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 5px; margin-left: 6px; }
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.resumo-box { background: var(--bg3); border-radius: 10px; padding: 14px; margin-top: 4px; }
.resumo-label { font-size: 11px; color: var(--text2); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.resumo-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.resumo-row:last-child { border-bottom: none; }
.resumo-row span:first-child { color: var(--text2); }
.resumo-row span:last-child { font-weight: 700; color: var(--text); }



footer { text-align: center; padding: 20px 16px 32px; font-size: 11px; color: var(--text2); }
</style>
</head>
<body>

<header>
  <div class="logo-icon">🪟</div>
  <div class="header-title">
    <h1>Tabela de Preços — Varejo</h1>
    <p>Eurovidros · Consulta de Preços de Venda</p>
  </div>
  <div class="badge-mes">MAR/26</div>
</header>

<main>
  <div class="card">
    <div class="card-label">1. Produto</div>
    <button class="picker-btn" id="btnProduto" onclick="abrirModal()">
      <span class="nome" id="nomeProduto">Toque para selecionar...</span>
      <span class="arrow">▾</span>
    </button>
  </div>

  <div class="card" id="cardEspessura" style="display:none">
    <div class="card-label">2. Espessura</div>
    <div class="chips-grid" id="chipsEspessura"></div>
  </div>

  <button class="btn-consultar" id="btnConsultar" disabled onclick="consultar()">
    🔍 Consultar Preços
  </button>

  <div id="resultado" style="display:none; margin-top:20px;"></div>
</main>

<footer>Eurovidros · Tabela Março/2026 · Uso interno — Equipe de Vendas</footer>

<!-- MODAL PRODUTO -->
<div class="modal-overlay" id="modalOverlay" onclick="fecharModalFora(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Selecione o Produto</div>
    <input class="modal-search" id="modalSearch" type="text" placeholder="Buscar produto..." oninput="filtrarProdutos()" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="modal-list" id="modalList"></div>
  </div>
</div>

let selProduto = '';
let selEspessura = '';

// --- MODAL ---
function abrirModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modalSearch').value = '';
  renderModalList(PRODUCTS);
  setTimeout(() => document.getElementById('modalSearch').focus(), 300);
}

function fecharModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function fecharModalFora(e) {
  if (e.target === document.getElementById('modalOverlay')) fecharModal();
}

function filtrarProdutos() {
  const q = document.getElementById('modalSearch').value.toLowerCase().trim();
  const filtered = q ? PRODUCTS.filter(p => p.toLowerCase().includes(q)) : PRODUCTS;
  renderModalList(filtered);
}

// Track touch movement to distinguish tap from scroll
let _touchStartY = 0;
let _touchMoved = false;

document.getElementById('modalList').addEventListener('touchstart', function(e) {
  _touchStartY = e.touches[0].clientY;
  _touchMoved = false;
}, {passive: true});

document.getElementById('modalList').addEventListener('touchmove', function(e) {
  if (Math.abs(e.touches[0].clientY - _touchStartY) > 8) {
    _touchMoved = true;
  }
}, {passive: true});

document.getElementById('modalList').addEventListener('touchend', function(e) {
  if (_touchMoved) return; // foi scroll, ignora
  const item = e.target.closest('.modal-item');
  if (item) {
    e.preventDefault();
    selecionarProduto(item.dataset.produto);
  }
});

document.getElementById('modalList').addEventListener('click', function(e) {
  const item = e.target.closest('.modal-item');
  if (item) selecionarProduto(item.dataset.produto);
});

function renderModalList(lista) {
  const ul = document.getElementById('modalList');
  ul.innerHTML = '';
  lista.forEach(p => {
    const div = document.createElement('div');
    div.className = 'modal-item' + (p === selProduto ? ' selected' : '');
    div.textContent = p;
    div.dataset.produto = p;
    ul.appendChild(div);
  });
}

function selecionarProduto(p) {
  selProduto = p;
  selEspessura = '';
  document.getElementById('nomeProduto').textContent = p;
  document.getElementById('btnProduto').classList.add('active');
  document.getElementById('resultado').style.display = 'none';
  document.getElementById('resultado').innerHTML = '';
  fecharModal();
  renderChips(p);
  document.getElementById('cardEspessura').style.display = 'block';
  updateBtn();
}

// --- CHIPS ---
function renderChips(produto) {
  const esps = ESP_MAP[produto] || [];
  const chips = document.getElementById('chipsEspessura');
  chips.innerHTML = '';
  esps.forEach(e => {
    const div = document.createElement('div');
    div.className = 'chip';
    div.textContent = e;
    div.dataset.e = e;
    chips.appendChild(div);
  });
}

document.getElementById('chipsEspessura').addEventListener('click', handleChip);
document.getElementById('chipsEspessura').addEventListener('touchend', handleChip);

function handleChip(ev) {
  const chip = ev.target.closest('.chip');
  if (!chip) return;
  ev.preventDefault();
  selEspessura = chip.dataset.e;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  chip.classList.add('selected');
  updateBtn();
}

function updateBtn() {
  document.getElementById('btnConsultar').disabled = !(selProduto && selEspessura);
}

// --- CONSULTA ---
// --- MARKUP ---
let markupPct = 75;

function getMarkup() { return markupPct; }

function calcPV(pci) {
  return pci * (1 + markupPct / 100);
}

function fmt(v) {
  if (v === null || v === undefined) return 'N/D';
  return 'R$ ' + v.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function consultar() {
  const rows = DB.filter(d => d.p === selProduto && d.e === selEspessura);
  const res = document.getElementById('resultado');
  res.style.display = 'block';
  res.innerHTML = '';

  if (rows.length === 0) {
    res.innerHTML = '<div style="background:var(--bg3);border-radius:10px;padding:16px;color:var(--text2);text-align:center;">Sem dados para esta combinação</div>';
    return;
  }

  const hdr = document.createElement('div');
  hdr.className = 'resultado-header';
  hdr.innerHTML = '<strong>' + selProduto + '</strong> · ' + selEspessura + ' · ' + rows.length + ' fornecedor' + (rows.length > 1 ? 'es' : '');
  res.appendChild(hdr);

  // Calcula PV dinamicamente com markup configurado
  const rowsComPV = rows.map(r => ({...r, pvCalc: r.pci ? calcPV(r.pci) : null}));
  const pvValues = rowsComPV.filter(d => d.pvCalc !== null).map(d => d.pvCalc);
  const minPv = pvValues.length > 0 ? Math.min(...pvValues) : null;
  const sorted = [...rowsComPV].sort((a, b) => {
    if (a.pvCalc === null && b.pvCalc === null) return 0;
    if (a.pvCalc === null) return 1;
    if (b.pvCalc === null) return -1;
    return a.pvCalc - b.pvCalc;
  });

  sorted.forEach(r => {
    const isMelhor = r.pvCalc !== null && minPv !== null && Math.abs(r.pvCalc - minPv) < 0.001 && pvValues.length > 1;
    const card = document.createElement('div');
    card.className = 'fornecedor-card' + (isMelhor ? ' melhor' : '');
    let diffHtml = '';
    if (!isMelhor && r.pvCalc !== null && minPv !== null && pvValues.length > 1) {
      const diff = ((r.pvCalc - minPv) / minPv * 100).toFixed(1);
      diffHtml = ' <span style="font-size:12px;color:var(--red);">+' + diff + '%</span>';
    }
    const ipiHtml = r.ipi ? '<span class="ipi-tag">IPI ' + r.ipi + '</span>' : '';
    card.innerHTML = (isMelhor ? '<div class="badge-melhor">✓ Menor Preço</div>' : '') +
      '<div class="fornec-nome">' + r.f + '</div>' +
      '<div class="fornec-grade">' +
        '<div class="fornec-item"><div class="fornec-item-label">P. Compra</div><div class="fornec-item-val">' + fmt(r.pc) + ipiHtml + '</div></div>' +
        '<div class="fornec-item"><div class="fornec-item-label">P. Compra c/ IPI</div><div class="fornec-item-val destaque-gold">' + fmt(r.pci) + '</div></div>' +
        '<div class="fornec-item full"><div class="fornec-item-label">P. Venda Sugerido</div><div class="fornec-item-val destaque">' + fmt(r.pvCalc) + diffHtml + '</div></div>' +
      '</div>';
    res.appendChild(card);
  });

  if (sorted.length > 1 && pvValues.length > 1) {
    const hr = document.createElement('hr'); hr.className = 'divider'; res.appendChild(hr);
    const maxPv = Math.max(...pvValues);
    const melhorF = sorted.find(r => Math.abs(r.pvCalc - minPv) < 0.001);
    const economia = ((maxPv - minPv) / maxPv * 100).toFixed(1);
    const resumo = document.createElement('div'); resumo.className = 'resumo-box';
    resumo.innerHTML = '<div class="resumo-label">📊 Resumo Comparativo</div>' +
      '<div class="resumo-row"><span>Menor P. Venda</span><span>' + fmt(minPv) + '</span></div>' +
      '<div class="resumo-row"><span>Maior P. Venda</span><span>' + fmt(maxPv) + '</span></div>' +
      '<div class="resumo-row"><span>Diferença</span><span>' + economia + '%</span></div>' +
      '<div class="resumo-row"><span>Melhor opção</span><span>' + (melhorF ? melhorF.f : '—') + '</span></div>';
    res.appendChild(resumo);
  }

  setTimeout(() => res.scrollIntoView({behavior: 'smooth', block: 'start'}), 100);
}
</script>
</body>
</html>
